global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'database'
    static_configs:
      - targets: ['database:8001']

  - job_name: 'uploader'
    static_configs:
      - targets: ['uploader:8002']

  - job_name: 'worker'
    static_configs:
      - targets: ['worker:8003']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq-exporter:9419']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
